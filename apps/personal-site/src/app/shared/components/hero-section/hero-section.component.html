<section class="relative min-h-screen flex items-center overflow-hidden">
  <!-- Background with Halftone SVG -->
  <div class="absolute inset-0 bg-gradient-to-r from-white via-white/95 to-transparent"></div>
  <div
    class="absolute right-0 top-0 h-full w-full bg-no-repeat bg-cover bg-right opacity-15"
    style="background-image: url('/assets/img/svg/halftone-pb.svg'); background-size: auto 100%"
  ></div>

  <!-- Hero Content -->
  <div class="relative z-10 mx-auto max-w-6xl px-6 py-24">
    <div class="max-w-3xl">
      <h1
        class="text-7xl lg:text-8xl font-black tracking-tight mb-6 text-gray-900 leading-none"
        [innerHTML]="title() | safeHtml"
      ></h1>

      @if (subtitle()) {
      <h2
        class="text-3xl lg:text-4xl font-light text-gray-600 mb-8 leading-relaxed"
        [innerHTML]="subtitle()! | safeHtml"
      ></h2>
      } @if (description()) {
      <p
        class="text-xl lg:text-2xl text-gray-700 mb-12 leading-relaxed max-w-2xl"
        [innerHTML]="description()! | safeHtml"
      ></p>
      } @if (ctas().length) {
      <div class="flex flex-col sm:flex-row gap-4 mb-16">
        @for (cta of ctas(); track cta.fragment) { @if (cta.variant === 'primary') {
        <a
          [routerLink]="['/']"
          [fragment]="cta.fragment"
          class="inline-flex items-center justify-center px-8 py-4 bg-blue-600 text-white text-lg font-semibold rounded-lg hover:bg-blue-700 transition-colors duration-200 shadow-lg hover:shadow-xl"
        >
          {{ cta.label }}
          <svg class="ml-2 w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
          </svg>
        </a>
        } @else {
        <a
          [routerLink]="['/']"
          [fragment]="cta.fragment"
          class="inline-flex items-center justify-center px-8 py-4 border-2 border-gray-300 text-gray-700 text-lg font-semibold rounded-lg hover:border-gray-400 hover:bg-gray-50 transition-all duration-200"
        >
          {{ cta.label }}
        </a>
        } }
      </div>
      } @if (stats().length) {
      <div class="grid grid-cols-2 lg:grid-cols-3 gap-8 text-center">
        @for (stat of stats(); track stat.value) {
        <div class="text-center" [class.col-span-2]="stat.spanFull" [class.lg:col-span-1]="stat.spanFull">
          <div class="text-3xl font-bold text-blue-600 mb-2">{{ stat.value }}</div>
          <div class="text-gray-600">{{ stat.label }}</div>
        </div>
        }
      </div>
      }
    </div>
  </div>
</section>
