<app-hero-section
  [title]="pageContent().title"
  [subtitle]="pageContent().subtitle"
  [description]="pageContent().description"
  [stats]="pageContent().stats ?? []"
  [ctas]="pageContent().ctas ?? []"
/>

@for (section of pageContent().sections; track section.id; let i = $index) {
  <app-page-section [section]="section" [index]="i" />
}
